services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: book-generation-api

    ports:
      - "8001:8000"

    env_file:
      - .env

    volumes:
      - ./app:/app/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    dns:
      - 8.8.8.8
      - 1.1.1.1

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
